name: EAS Deploy

on:
  push:
    branches:
      - main
      - 'release/**'
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [ios, android]
    env:
      EAS_PROFILE: ${{ github.ref == 'refs/heads/main' && 'preview' || (startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/')) && 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Verify package.json exists
        run: |
          echo "PWD: $(pwd)"
          ls -la
          if [ ! -f package.json ]; then echo "package.json not found at repo root"; exit 1; fi
          head -n 50 package.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Check tokens
        run: |
          if [ -z "$EAS_TOKEN" ]; then echo "Missing EAS_TOKEN secret"; exit 1; fi
          if [ -z "$EXPO_TOKEN" ]; then echo "Missing EXPO_TOKEN secret"; exit 1; fi
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build and Push
        if: ${{ env.EAS_PROFILE != '' }}
        run: eas build --platform ${{ matrix.platform }} --profile $EAS_PROFILE
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
