name: EAS Deploy

on:
  push:
    branches:
      - main
      - 'release/**'
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [ios, android]
    env:
      EAS_PROFILE: ${{ github.ref == 'refs/heads/main' && 'preview' || (startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/')) && 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Verify package.json exists
        run: |
          echo "PWD: $(pwd)"
          ls -la
          if [ ! -f package.json ]; then echo "package.json not found at repo root"; exit 1; fi
          head -n 50 package.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Normalize tokens
        run: |
          echo "Normalizing tokens: prefer EAS_TOKEN, fall back to EXPO_TOKEN"
          if [ -n "${{ secrets.EAS_TOKEN }}" ]; then
            echo "EAS_TOKEN is provided at secret level"
            echo "EAS_TOKEN=${{ secrets.EAS_TOKEN }}" >> $GITHUB_ENV
          elif [ -n "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "EAS_TOKEN secret missing; using EXPO_TOKEN as fallback"
            echo "EAS_TOKEN=${{ secrets.EXPO_TOKEN }}" >> $GITHUB_ENV
          else
            echo "No EAS_TOKEN or EXPO_TOKEN secret provided"
          fi

      - name: Check token
        run: |
          if [ -z "$EAS_TOKEN" ]; then echo "Missing EAS_TOKEN/EXPO_TOKEN secret"; exit 1; fi

      - name: Verify EAS token
        run: |
          echo "Verifying EAS token..."
          eas whoami --token "$EAS_TOKEN" || (echo "EAS_TOKEN is invalid or expired"; exit 1)
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}

      - name: Build and Push
        if: ${{ env.EAS_PROFILE != '' }}
        run: eas build --platform ${{ matrix.platform }} --profile $EAS_PROFILE
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
