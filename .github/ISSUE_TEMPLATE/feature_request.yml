name: 💡 Feature Request
description: Suggest a new feature or improvement for BOUNTYExpo
labels: ["enhancement", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! We read every request and use them to plan future releases.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Bounty Creation
        - Postings Feed / Discovery
        - Messaging / Chat
        - Wallet / Payments
        - Profile & Settings
        - Notifications
        - Search
        - Onboarding
        - Accessibility
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this feature solve? What user need does it address?
      placeholder: "As a hunter, I find it hard to... because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see. Mockups or examples are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds or considered other approaches?

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would significantly improve my experience
        - Blocking my use of the app

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or references.
