name: 🐛 Bug Report
description: Report a bug or unexpected behaviour in BOUNTYExpo
labels: ["bug", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix it quickly.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I am running the latest version of the app.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
      placeholder: "When I tap 'Accept Bounty', the app crashes with..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the exact steps needed to reproduce the bug.
      placeholder: |
        1. Open the Postings feed
        2. Tap on a bounty
        3. Tap 'Accept'
        4. See error / crash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include error messages or screenshots if available.
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Both
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS version
      placeholder: "e.g. iOS 17.4 / Android 14"

  - type: input
    id: device
    attributes:
      label: Device model
      placeholder: "e.g. iPhone 15 Pro / Pixel 8"

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How badly does this affect your use of the app?
      options:
        - Critical (app crashes / data loss / cannot complete core flow)
        - High (major feature broken, no workaround)
        - Medium (feature partially broken, workaround exists)
        - Low (minor visual issue or annoyance)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any error messages, stack traces, or console output here.
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or videos that might help.
